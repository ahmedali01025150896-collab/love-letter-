<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيد ميلاد سعيد يا روان ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            background: black;
            color: white;
            font-family: 'Aref Ruqaa', serif; /* الخط المزخرف الأساسي */
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* خلفية النجوم المتحركة */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background: #000 url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png') repeat top center;
        }

        .twinkling {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: transparent url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/twinkling.png') repeat top center;
            animation: move-twink-back 200s linear infinite;
        }

        @keyframes move-twink-back {
            from { background-position: 0 0; }
            to { background-position: -10000px 5000px; }
        }

        .container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            text-align: center;
            min-height: 100vh;
            justify-content: center;
        }

        .content-box {
            max-width: 750px;
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255, 77, 77, 0.4);
            box-shadow: 0 0 35px rgba(255, 77, 77, 0.3);
        }

        h1 {
            color: #ff4d4d;
            font-size: 3.2rem;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(255, 77, 77, 0.8);
        }

        .message-p {
            font-size: 1.8rem;
            line-height: 2.3;
            margin-bottom: 25px;
            display: block;
            font-family: 'Amiri', serif; /* خط القراءة المريح والمزخرف */
        }

        /* تأثير الكلمات */
        .word {
            display: inline-block;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.6s ease-out;
            margin: 0 5px;
        }

        .word.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .highlight {
            color: #ff4d4d;
            font-weight: bold;
            font-size: 2.2rem;
            font-family: 'Aref Ruqaa', serif;
        }

        button {
            background: linear-gradient(45deg, #ff4d4d, #b30000);
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 50px;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 77, 77, 0.4);
            transition: 0.3s;
            font-family: 'Aref Ruqaa', serif;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(255, 77, 77, 0.6);
        }

        /* خانة كلمة المرور بنفس الخط المزخرف */
        input {
            padding: 18px;
            border-radius: 15px;
            border: 2px solid #ff4d4d;
            background: #000;
            color: white;
            text-align: center;
            font-size: 1.4rem;
            margin-bottom: 20px;
            width: 85%;
            outline: none;
            font-family: 'Aref Ruqaa', serif; /* الخط الخرافي هنا أيضاً */
            box-shadow: inset 0 0 10px rgba(255, 77, 77, 0.2);
        }

        input::placeholder {
            font-family: 'Amiri', serif;
            font-size: 1.1rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="stars-container"></div>
    <div class="twinkling"></div>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div id="lockScreen" class="content-box">
            <h2 style="color: #ff4d4d; font-size: 2.5rem;">الموقع محمي ❤️</h2>
            <p style="font-size: 1.3rem; margin-bottom: 20px;">انسخ كلمة المرور واكتبها هنا ✨</p>
            <input type="text" id="passwordInput" placeholder="كل سنه وانتِ طيبه ي رورو🥹💞">
            <br>
            <button onclick="checkPassword()">دخول ✨</button>
        </div>

        <button id="startBtn" style="display: none;" onclick="startSurprise()">اضغط هنا يا روان ✨</button>

        <div id="mainContent" style="display: none;" class="content-box">
            <div id="messageContainer"></div>
            <div id="finalFooter" style="margin-top: 40px; font-style: italic; color: #ffb3b3; display: none; font-size: 1.6rem;">بكل حب من أحمد إلى روان ❤️</div>
        </div>
    </div>

    <script>
        // كلمة المرور المطلوبة بالضبط
        const pass = "كل سنه وانتِ طيبه ي رورو🥹💞";

        function checkPassword() {
            const input = document.getElementById("passwordInput").value.trim();
            if (input === pass) {
                document.getElementById("lockScreen").style.display = "none";
                document.getElementById("startBtn").style.display = "block";
            } else {
                alert("كلمة المرور غير صحيحة، تأكدي من كتابتها أو نسخها بالكامل ❤️");
            }
        }

        const messages = [
            "النهارده مش يوم عادي خالص… النهارده اليوم اللي الدنيا كسبت فيه واحدة زيك 🌍✨",
            "اليوم اللي اتولدت فيه أجمل ضحكة، وأحن قلب، وألطف روح ممكن حد يقابلها 💖",
            "16 سنة يا بنتي 😭🎉",
            "ستاشر سنة من الجمال، والطيبة، والضحك اللي بيغيّر أي يوم وحش لفرحة 💕🌸",
            "كل سنة وانتي أحلى حاجة حصلت في حياتي ❤️",
            "بجد مهما كتبت كلام مش هيوصف قد إيه انتي غالية عليا 🫶🏻💘",
            "انتي الأمان والونس والراحة..",
            "يارب السنة دي تكون أسعد سنة في حياتك 🎂✨",
            "16 سنة؟ بقيتي قمر معتمد 🌙💘",
            "أنا بحبك حب قد السما وأكبر 💞🌍",
            "بحبك أوي أوي أوي 😭❤️❤️❤️❤️",
            "وكل سنة وانتي أجمل نعمة في حياتي 💞🫶🏻"
        ];

        async function showWordByWord(text, containerId, isTitle = false) {
            const container = document.getElementById(containerId);
            const p = document.createElement(isTitle ? "h1" : "p");
            if (!isTitle) p.className = "message-p";
            
            // تمييز الكلمات المهمة بلون أحمر
            if (text.includes("16 سنة") || text.includes("بحبك")) {
                p.classList.add("highlight");
            }

            container.appendChild(p);

            const words = text.split(" ");
            for (let word of words) {
                const span = document.createElement("span");
                span.className = "word";
                span.innerText = word;
                p.appendChild(span);

                await new Promise(res => setTimeout(res, 250)); // سرعة ظهور الكلمات
                span.classList.add("visible");
                
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
            await new Promise(res => setTimeout(res, 600));
        }

        async function startSurprise() {
            const audio = document.getElementById("bgMusic");
            audio.play();

            document.getElementById("startBtn").style.display = "none";
            document.getElementById("mainContent").style.display = "block";

            // إظهار العنوان أولاً كلمة كلمة
            await showWordByWord("Happy Birthday روان ❤️🎂", "messageContainer", true);

            // إظهار الرسائل
            for (let msg of messages) {
                await showWordByWord(msg, "messageContainer");
            }

            const footer = document.getElementById("finalFooter");
            footer.style.display = "block";
        }
    </script>
</body>
</html>
