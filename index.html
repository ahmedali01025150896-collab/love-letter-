<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى روان ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Reem+Kufi:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --main-color: #ff4d6d; --bg-color: #fff0f3; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg-color); 
            font-family: 'Cairo', sans-serif; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }

        /* خلفية ناعمة متدرجة */
        .gradient-bg {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 50%, #fff0f3 0%, #ffcad4 100%);
            z-index: -1;
        }

        /* شاشة القفل */
        #lock-screen {
            position: fixed; inset: 0;
            background: var(--main-color);
            color: white; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 1s ease-in-out;
        }

        #lock-screen h2 { font-family: 'Reem Kufi', sans-serif; margin-bottom: 20px; font-size: 30px; }
        #lock-screen input { 
            padding: 15px; border-radius: 50px; border: none; width: 280px; 
            text-align: center; font-size: 18px; outline: none; margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        #lock-screen button { 
            padding: 12px 60px; border-radius: 50px; border: 2px solid white; 
            background: transparent; color: white; cursor: pointer; font-size: 18px; font-weight: bold;
            transition: 0.3s;
        }
        #lock-screen button:hover { background: white; color: var(--main-color); }

        /* الكارت الرئيسي */
        .main-card {
            width: 90%; max-width: 450px; height: 600px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .slide {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 30px; opacity: 0; transition: 0.8s ease-in-out; text-align: center;
        }
        .slide.active { opacity: 1; }

        .img-frame {
            width: 280px; height: 280px; border-radius: 25px;
            overflow: hidden; border: 6px solid white;
            box-shadow: 0 15px 30px rgba(255, 77, 109, 0.2);
            margin-bottom: 20px;
        }
        .img-frame img { width: 100%; height: 100%; object-fit: cover; }

        h1 { color: var(--main-color); font-family: 'Reem Kufi', sans-serif; font-size: 32px; margin-bottom: 15px; }
        p { color: #590d22; font-size: 20px; line-height: 1.6; }

        .nav-btns { position: absolute; bottom: 30px; display: flex; gap: 20px; }
        .nav-btns button { 
            background: var(--main-color); color: white; border: none; 
            padding: 10px 30px; border-radius: 15px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="gradient-bg"></div>

    <div id="lock-screen">
        <i class="fa-solid fa-heart" style="font-size: 50px; margin-bottom: 15px;"></i>
        <h2>رسالة خاصة لروان ❤️</h2>
        <input type="password" id="passwordField" placeholder="اكتبي كلمة السر...">
        <button onclick="unlock()">دخول ❤️</button>
    </div>

    <audio id="love-music" loop>
        <source src="https://www.mboxdrive.com/soft-piano-background-music.mp3" type="audio/mpeg">
    </audio>

    <div class="main-card" id="card">
        <div class="slide active">
            <h1>يا كل دنيتي ❤️</h1>
            <p>من يوم ما دخلتي حياتي وكل حاجة بقا ليها طعم تاني، كأن الضحكة مكنتش بتطلع غير ليكي 💕</p>
        </div>

        <div class="slide">
            <div class="img-frame">
                <img src="205848.jpg" alt="ذكرى">
            </div>
            <h1>إنتِ السكينة 🤍</h1>
            <p>وجودك جنبي بيهوّن أي حاجة صعبة، إنتِ الأمان اللي كنت بدور عليه 💌</p>
        </div>

        <div class="slide">
            <div class="img-frame">
                <img src="205387.png" alt="أحمد وروان">
            </div>
            <h1>بحبك للأبد 💖</h1>
            <p>وعد مني هفضل جنبك ومعاكي، ومفيش حاجة في الدنيا هتبعدني عنك يا روان 💘</p>
        </div>

        <div class="nav-btns">
            <button onclick="prev()">السابق</button>
            <button onclick="next()">التالي</button>
        </div>
    </div>

    <script>
        function unlock() {
            var pass = document.getElementById('passwordField').value.toLowerCase();
            if(pass === 'bahabek ya rewan') {
                document.getElementById('lock-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('card').style.display = 'flex';
                }, 1000);
                document.getElementById('love-music').play();
            } else {
                alert('كلمة السر غلط يا روان ❤️');
            }
        }

        let current = 0;
        const slides = document.querySelectorAll('.slide');
        function next() {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }
        function prev() {
            slides[current].classList.remove('active');
            current = (current - 1 + slides.length) % slides.length;
            slides[current].classList.add('active');
        }
    </script>
</body>
</html>
