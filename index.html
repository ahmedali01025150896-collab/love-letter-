<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى روان ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Aref+Ruqaa&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fff0f3; margin: 0; font-family: 'Amiri', serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #lock-screen { position: fixed; inset: 0; background: #ff4d6d; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; transition: 0.8s; }
        #lock-screen input { padding: 12px; border-radius: 25px; border: none; width: 250px; text-align: center; margin-bottom: 15px; }
        #lock-screen button { padding: 10px 40px; border-radius: 25px; border: 2px solid white; background: transparent; color: white; cursor: pointer; font-weight: bold; }
        .deck { width: 100%; max-width: 500px; height: 600px; background: white; display: none; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 20px; }
        .slide { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; opacity: 0; transition: 0.5s; text-align: center; }
        .slide.active { opacity: 1; }
        .img-box { width: 280px; height: 280px; border: 5px solid #ffcad4; border-radius: 15px; overflow: hidden; margin-bottom: 15px; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        h1 { font-family: 'Aref Ruqaa', serif; color: #ff4d6d; margin: 10px 0; }
        p { font-size: 18px; color: #590d22; line-height: 1.5; }
        .nav { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-around; }
        .nav button { background: #ff4d6d; color: white; border: none; padding: 8px 25px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2 style="font-family: 'Aref Ruqaa';">مكاننا الخاص يا روان ❤️</h2>
        <input type="password" id="pw" placeholder="اكتبي كلمة السر...">
        <button onclick="start()">دخول ❤️</button>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div class="deck" id="main-deck">
        <div class="slide active">
            <h1>يا حبيبتي ❤️</h1>
            <p>أنا مش عارف إزاي يومي كان بيعدّي قبل ما أدخلك فيه... بس دلوقتي أي حاجة بقت مختلفة 💕</p>
        </div>

        <div class="slide">
            <div class="img-box">
                <img src="205848.jpg" alt="ذكرى">
            </div>
            <h1>إنتِ السكينة 🤍</h1>
            <p>كل رسالة منك بتطبطب على قلبي وتقولّه “اهدى… أنا هنا” 💌</p>
        </div>

        <div class="slide">
            <div class="img-box">
                <img src="205387.png" alt="أحمد وروان">
            </div>
            <h1>بحبك للأبد 💖</h1>
            <p>أنا مش عايز من الدنيا غير إنك تفضلي جنبي بنفس الحنية والأمان 💘</p>
        </div>

        <div class="nav">
            <button onclick="change(-1)">السابق</button>
            <button onclick="change(1)">التالي</button>
        </div>
    </div>

    <script>
        function start() {
            if(document.getElementById('pw').value.toLowerCase() === 'bahabek ya rewan') {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-deck').style.display = 'block';
                document.getElementById('bg-music').play();
            } else { alert('كلمة السر غلط ❤️'); }
        }
        let current = 0;
        const slides = document.querySelectorAll('.slide');
        function change(n) {
            slides[current].classList.remove('active');
            current = (current + n + slides.length) % slides.length;
            slides[current].classList.add('active');
        }
    </script>
</body>
</html>
